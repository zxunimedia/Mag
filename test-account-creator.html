<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶測試帳號快速創建</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .config-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .accounts-list {
            background: #e8f5e8;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .account-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }
        .copy-btn {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        }
        .copy-btn:hover {
            background: #218838;
        }
        .loading {
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 客戶測試帳號快速創建</h1>
            <p>為 MOC 原村計畫管考系統創建測試帳號</p>
        </div>

        <div class="config-section">
            <h3>🔧 Supabase 配置</h3>
            <div class="input-group">
                <label for="supabase-url">Supabase URL:</label>
                <input type="url" id="supabase-url" placeholder="https://your-project.supabase.co">
            </div>
            <div class="input-group">
                <label for="supabase-key">Supabase Anon Key:</label>
                <input type="text" id="supabase-key" placeholder="eyJhbGci...">
            </div>
        </div>

        <div class="config-section">
            <h3>📋 即將創建的測試帳號</h3>
            <div class="account-item">
                <strong>1. 管理員帳號</strong><br>
                Email: admin-test@mocwork.com | 密碼: admin123456
            </div>
            <div class="account-item">
                <strong>2. 輔導老師帳號</strong><br>
                Email: coach-test@mocwork.com | 密碼: coach123456
            </div>
            <div class="account-item">
                <strong>3. 操作人員帳號</strong><br>
                Email: operator-test@mocwork.com | 密碼: operator123456
            </div>
        </div>

        <button class="btn" id="create-btn" onclick="createTestAccounts()">
            立即創建測試帳號
        </button>

        <div id="status"></div>
        <div id="results"></div>
    </div>

    <script>
        const testAccounts = [
            {
                name: '系統管理員',
                email: 'admin-test@mocwork.com',
                password: 'admin123456',
                role: 'MOC_ADMIN',
                unitId: 'MOC',
                unitName: '文化部'
            },
            {
                name: '輔導老師',
                email: 'coach-test@mocwork.com',
                password: 'coach123456',
                role: 'COACH',
                unitId: 'MOC',
                unitName: '文化部'
            },
            {
                name: '操作人員',
                email: 'operator-test@mocwork.com',
                password: 'operator123456',
                role: 'UNIT_OPERATOR',
                unitId: 'TEST001',
                unitName: '測試執行單位'
            }
        ];

        let supabase = null;

        function initSupabase() {
            const url = document.getElementById('supabase-url').value;
            const key = document.getElementById('supabase-key').value;
            
            if (!url || !key) {
                showStatus('請填寫 Supabase URL 和 Anon Key', 'error');
                return false;
            }

            try {
                supabase = window.supabase.createClient(url, key);
                return true;
            } catch (error) {
                showStatus('Supabase 初始化失敗: ' + error.message, 'error');
                return false;
            }
        }

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function showLoading() {
            document.getElementById('status').innerHTML = 
                '<div class="loading">⏳ 正在創建測試帳號，請稍候...</div>';
        }

        async function createTestAccounts() {
            if (!initSupabase()) return;

            const createBtn = document.getElementById('create-btn');
            createBtn.disabled = true;
            showLoading();

            const results = [];
            const errors = [];

            for (const account of testAccounts) {
                try {
                    console.log(`創建帳號: ${account.email}`);
                    
                    // 1. 註冊 Auth 用戶
                    const { data: authData, error: authError } = await supabase.auth.signUp({
                        email: account.email,
                        password: account.password,
                        options: {
                            data: {
                                name: account.name,
                                role: account.role
                            }
                        }
                    });

                    if (authError) {
                        if (authError.message?.includes('User already registered')) {
                            console.log(`帳號已存在: ${account.email}`);
                            results.push(account);
                        } else {
                            errors.push(`${account.email}: ${authError.message}`);
                            continue;
                        }
                    } else if (authData.user) {
                        // 2. 創建 profile 記錄
                        const { error: profileError } = await supabase
                            .from('profiles')
                            .upsert({
                                id: authData.user.id,
                                name: account.name,
                                email: account.email,
                                role: account.role,
                                unit_id: account.unitId,
                                unit_name: account.unitName,
                                created_at: new Date().toISOString(),
                                updated_at: new Date().toISOString()
                            });

                        if (profileError) {
                            console.warn(`Profile 創建警告: ${profileError.message}`);
                        }

                        results.push(account);
                    }

                    // 避免過於頻繁的請求
                    await new Promise(resolve => setTimeout(resolve, 500));

                } catch (error) {
                    errors.push(`${account.email}: ${error.message}`);
                }
            }

            createBtn.disabled = false;
            displayResults(results, errors);
        }

        function displayResults(results, errors) {
            const resultsDiv = document.getElementById('results');
            
            if (results.length > 0) {
                showStatus(`✅ 成功創建 ${results.length} 個測試帳號！`, 'success');
                
                let html = '<div class="accounts-list"><h3>🎉 客戶測試帳號清單</h3>';
                
                results.forEach((account, index) => {
                    const roleDisplay = {
                        'MOC_ADMIN': '系統管理員',
                        'COACH': '輔導老師',
                        'UNIT_OPERATOR': '操作人員'
                    }[account.role];

                    html += `
                        <div class="account-item">
                            <strong>${index + 1}. ${roleDisplay}帳號</strong><br>
                            <strong>Email:</strong> ${account.email}
                            <button class="copy-btn" onclick="copyText('${account.email}')">複製</button><br>
                            <strong>密碼:</strong> <code>${account.password}</code>
                            <button class="copy-btn" onclick="copyText('${account.password}')">複製</button><br>
                            <strong>角色:</strong> ${roleDisplay}<br>
                            <strong>單位:</strong> ${account.unitName}
                        </div>
                    `;
                });

                html += `
                    <div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 8px;">
                        <h4>⚠️ 重要提醒：</h4>
                        <ul style="margin: 10px 0; padding-left: 20px;">
                            <li>這些帳號需要在 Supabase Dashboard 中手動確認 Email</li>
                            <li>或修改 Email 使用真實信箱以接收驗證信</li>
                            <li>確認後客戶即可使用上述帳密登入測試</li>
                        </ul>
                    </div>
                `;

                html += '</div>';
                resultsDiv.innerHTML = html;
            } else {
                showStatus('❌ 沒有成功創建任何測試帳號', 'error');
            }

            if (errors.length > 0) {
                let errorHtml = '<div class="status error"><h4>創建過程中的錯誤：</h4><ul>';
                errors.forEach(error => {
                    errorHtml += `<li>${error}</li>`;
                });
                errorHtml += '</ul></div>';
                resultsDiv.innerHTML += errorHtml;
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('已複製到剪貼板！');
            }).catch(() => {
                alert('複製失敗，請手動選取複製');
            });
        }
    </script>
</body>
</html>
